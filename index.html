<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conexão Acessível</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🤖 Conexão Acessível</h1>
  <p>IA para inclusão real</p>
</header>

<main>

  <!-- CHAT -->
  <section class="chat-container">
    <div id="chat-box"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Digite sua necessidade..." />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </section>

  <!-- RESULTADO -->
  <section id="result" class="hidden">
    <h2>🔍 Análise da IA</h2>
    <p id="analysisText"></p>

    <button onclick="createTicket()">Abrir chamado</button>
  </section>

  <!-- CHAMADO -->
  <section id="ticket" class="hidden">
    <h2>🎉 Chamado criado</h2>
    <p id="ticketInfo"></p>
  </section>

  <!-- DASHBOARD -->
  <section class="dashboard">
    <h2>📊 Dashboard</h2>

    <div class="cards">
      <div class="card">
        <h3>Tempo médio</h3>
        <p>2,3 dias</p>
      </div>

      <div class="card">
        <h3>Principal problema</h3>
        <p>Sistemas internos</p>
      </div>

      <div class="card alert">
        <h3>⚠️ Alerta</h3>
        <p>Sistema de ponto com falhas</p>
      </div>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
