<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- LADO ESQUERDO -->
  <div class="sidebar">
    <div class="header">Conversas</div>

    <div class="contact active" onclick="selectContact('João')">
      João
    </div>

    <div class="contact" onclick="selectContact('Maria')">
      Maria
    </div>

    <div class="contact" onclick="selectContact('Suporte')">
      Suporte
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat">

    <div class="chat-header" id="chatHeader">
      João
    </div>

    <div class="chat-messages" id="chat"></div>

    <div class="chat-input">
      <input type="text" id="inputMsg" placeholder="Digite uma mensagem...">
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
