<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>IA-Acess Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="header">IA-Acess</div>
    <div class="contact active">Assistente de Acessibilidade</div>
  </div>

  <!-- CHAT -->
  <div class="chat">

    <div class="chat-header">
      <img src="assistente.png" class="avatar">
      <div>
        <div class="name">IA-Acess</div>
        <div class="status">Online</div>
      </div>
    </div>

    <div class="chat-messages" id="chat"></div>

    <div class="chat-input">
      <input type="text" id="inputMsg" placeholder="Descreva a barreira encontrada...">
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
