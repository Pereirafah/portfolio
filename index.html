<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel WhatsApp Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  🤖 Painel WhatsApp Automation (n8n + IA)
</header>

<div class="container">

  <!-- STATUS -->
  <div class="card">
    <h3>Status do Sistema</h3>

    <div class="status">
      Webhook
      <span class="online">ONLINE</span>
    </div>

    <div class="status">
      IA (GPT)
      <span class="online">ATIVO</span>
    </div>

    <div class="status">
      Redis
      <span class="online">CONECTADO</span>
    </div>

    <div class="status">
      Processamento
      <span id="processStatus" class="offline">PARADO</span>
    </div>
  </div>

  <!-- CHAT -->
  <div class="card">
    <h3>Simulador de Mensagens</h3>

    <div class="messages" id="chat"></div>

    <br>
    <input type="text" id="inputMsg" placeholder="Digite uma mensagem...">
    <button onclick="sendMessage()">Enviar</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
